<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小叮当服务团队群 · 代理新增</title>
<style>
  :root {
    --bg: #0A1A4E;
    --bg2: #0D2260;
    --sidebar: #081540;
    --card: #ffffff;
    --card-blue: #EAF3FF;
    --accent: #2563EB;
    --accent2: #3B82F6;
    --gold: #F59E0B;
    --text: #1E293B;
    --text-light: #64748B;
    --text-white: #ffffff;
    --green: #10B981;
    --red: #EF4444;
    --orange: #F97316;
    --border: #E2E8F0;
    --shadow: 0 4px 20px rgba(0,0,0,0.15);
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif; }
  body { background: var(--bg); min-height: 100vh; }

  /* ── LOGIN ── */
  #login-screen {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; align-items: center; justify-content: center; z-index: 100;
  }
  .login-box {
    background: #1A2E52; border-radius: 20px; padding: 40px 36px;
    width: 340px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); text-align: center;
  }
  .login-logo { font-size: 52px; margin-bottom: 12px; }
  .login-title { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 4px; }
  .login-sub { font-size: 13px; color: #8BA3C7; margin-bottom: 28px; }
  .login-label { font-size: 12px; color: #8BA3C7; text-align: left; margin-bottom: 6px; }
  .login-input {
    width: 100%; padding: 12px 14px; border-radius: 10px;
    border: 1.5px solid #2A4070; background: #0F1F3D;
    color: #fff; font-size: 15px; outline: none; margin-bottom: 8px;
  }
  .login-input:focus { border-color: #3B82F6; }
  .login-err { color: #EF4444; font-size: 12px; margin-bottom: 10px; min-height: 18px; }
  .login-btn {
    width: 100%; padding: 13px; border-radius: 10px; border: none;
    background: linear-gradient(135deg, #3B82F6, #1D4ED8);
    color: #fff; font-size: 15px; font-weight: 700; cursor: pointer;
    transition: opacity .2s;
  }
  .login-btn:hover { opacity: .88; }

  /* ── APP ── */
  #app { display: none; }

  /* ── TOP BAR ── */
  .topbar {
    background: var(--sidebar);
    height: 60px; display: flex; align-items: center;
    padding: 0 20px; gap: 12px;
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .logo-circle {
    width: 38px; height: 38px; border-radius: 50%;
    background: linear-gradient(135deg, #2196F3, #1565C0);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; color: white; border: 2px solid rgba(255,255,255,0.3);
  }
  .logo-text { color: white; font-size: 15px; font-weight: 700; }
  .version-badge {
    background: var(--accent); color: white;
    font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px;
  }
  .topbar-right { margin-left: auto; }
  .logout-btn {
    background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.8);
    border: none; padding: 6px 14px; border-radius: 20px; font-size: 13px;
    cursor: pointer; transition: all .2s;
  }
  .logout-btn:hover { background: rgba(255,255,255,0.2); color: white; }

  /* ── MAIN ── */
  .main { padding: 84px 24px 60px; max-width: 760px; margin: 0 auto; }

  /* ── PAGE HEADER ── */
  .page-header { margin-bottom: 20px; }
  .page-title-row { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
  .page-title { color: white; font-size: 20px; font-weight: 700; }
  .page-badge {
    background: rgba(37,99,235,0.3); color: #93C5FD;
    padding: 2px 10px; border-radius: 10px; font-size: 12px; font-weight: 600;
  }
  .page-sub { color: rgba(255,255,255,0.5); font-size: 13px; }

  /* ── FORM ── */
  .form-wrap {
    background: white; border-radius: var(--radius);
    padding: 32px; box-shadow: var(--shadow);
  }
  .form-row { margin-bottom: 20px; }
  .form-label {
    display: flex; align-items: center; gap: 6px;
    font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 8px;
  }
  .required { color: var(--red); }
  .form-input {
    width: 100%; padding: 11px 14px; border: 1.5px solid var(--border);
    border-radius: 8px; font-size: 14px; color: var(--text); outline: none;
    transition: border-color 0.2s; background: white;
  }
  .form-input:focus { border-color: var(--accent); }
  .form-input.error { border-color: var(--red); }
  .input-group { display: flex; }
  .input-group .form-input { border-radius: 0 8px 8px 0; }
  .cur-sel {
    border: 1.5px solid var(--border); border-right: none;
    background: #E8F0FE; color: #1E3A5F; font-weight: 700; font-size: 14px;
    padding: 0 10px; border-radius: 8px 0 0 8px; cursor: pointer; outline: none;
    min-width: 68px;
  }
  .form-hint { font-size: 12px; color: var(--text-light); margin-top: 4px; }
  .form-footer {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 28px; padding-top: 20px; border-top: 1px solid var(--border);
    flex-wrap: wrap; gap: 12px;
  }
  .form-notice { font-size: 12px; color: var(--text-light); display: flex; align-items: center; gap: 5px; }
  .btn-primary {
    background: var(--accent); color: white;
    padding: 10px 22px; border-radius: 8px; font-size: 14px; font-weight: 600;
    border: none; cursor: pointer; display: flex; align-items: center; gap: 6px;
    white-space: nowrap; transition: background .2s;
  }
  .btn-primary:hover { background: #1D4ED8; }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
  .btn-secondary {
    background: white; color: var(--text);
    padding: 10px 22px; border-radius: 8px; font-size: 14px; font-weight: 600;
    border: 1.5px solid var(--border); cursor: pointer; transition: all .2s;
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

  /* ── SUCCESS BANNER ── */
  #success-banner {
    display: none;
    background: #D1FAE5; border: 1.5px solid #6EE7B7; border-radius: var(--radius);
    padding: 16px 20px; margin-bottom: 20px; text-align: center;
  }
  .s-title { font-size: 15px; font-weight: 700; color: #065F46; margin-bottom: 4px; }
  .s-sub { font-size: 13px; color: #047857; }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: #10B981; color: #fff; font-size: 14px; font-weight: 600;
    padding: 13px 28px; border-radius: 30px; box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    transition: transform .3s ease; z-index: 9999; white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">🔔</div>
    <div class="login-title">小叮当服务团队群</div>
    <div class="login-sub">代理专用 · 新增客户</div>
    <div class="login-label">🔒 代理密码</div>
    <input class="login-input" type="password" id="pw-input" placeholder="输入密码..."
      onkeydown="if(event.key==='Enter')doLogin()">
    <div class="login-err" id="login-err"></div>
    <button class="login-btn" onclick="doLogin()">进入系统</button>
  </div>
</div>

<!-- App -->
<div id="app">
  <div class="topbar">
    <div class="logo-circle">🔔</div>
    <div class="logo-text">小叮当服务团队群</div>
    <div class="version-badge">代理专用</div>
    <div class="topbar-right">
      <button class="logout-btn" onclick="doLogout()">退出登录</button>
    </div>
  </div>

  <div class="main">

    <!-- Success Banner -->
    <div id="success-banner">
      <div class="s-title" id="s-title">✅ 客户已成功提交！</div>
      <div class="s-sub" id="s-sub">管理员将跟进处理</div>
    </div>

    <!-- Page Header -->
    <div class="page-header">
      <div class="page-title-row">
        <span class="page-title">新增客户</span>
        <span class="page-badge">代理专用</span>
      </div>
      <div class="page-sub">代理简化版，快速录入客户资料</div>
    </div>

    <!-- Form -->
    <div class="form-wrap">

      <div class="form-row">
        <div class="form-label">护照名字 <span class="required">*</span></div>
        <input class="form-input" id="f-name" type="text" placeholder="请输入护照名字">
      </div>

      <div class="form-row">
        <div class="form-label">护照号 <span class="required">*</span></div>
        <input class="form-input" id="f-passport" type="text" placeholder="请输入护照号">
      </div>

      <div class="form-row">
        <div class="form-label">项目内容 <span class="required">*</span></div>
        <select class="form-input" id="f-project" style="cursor:pointer;">
          <option value="">请选择项目内容</option>
          <option>马来西亚借票</option>
          <option>代办新护照/旅行证</option>
          <option>无盖章激活</option>
          <option>🚗刷签人去（当天好）</option>
          <option>🚗刷签双系统</option>
          <option>🚗盖章(7天-10天）</option>
          <option>🚗盖章(3天-5天）</option>
          <option>✈️盖章(7-10天)</option>
          <option>设置柜台服务</option>
          <option>罚款SP14天（一本一次）</option>
          <option>罚款SP30天（一本一次）</option>
          <option>西马一年女佣证</option>
          <option>东马半年</option>
          <option>东马一年</option>
          <option>西马半年演绎证</option>
          <option>西马半年老人签</option>
          <option>西马续签4年中国结婚证</option>
          <option>西马一年PVP</option>
          <option>西马学生证两年（1年+1年)</option>
          <option>马来西亚考驾校服务</option>
          <option>一年工作签开银行服务</option>
          <option>马来西亚电子签（EVISA）</option>
          <option>APEC（马来西人）</option>
          <option>马来西亚和中国双认证服务</option>
          <option>VIP快速通道（提前3天）</option>
        </select>
      </div>

      <div class="form-row">
        <div class="form-label">押金 <span class="required">*</span></div>
        <div class="input-group">
          <select class="cur-sel" id="f-deposit-cur" onchange="document.getElementById('f-price-cur').value=this.value">
            <option value="RM">RM</option>
            <option value="RMB">RMB</option>
          </select>
          <input class="form-input" id="f-deposit" type="number" placeholder="请输入押金" min="0" step="0.01">
        </div>
      </div>

      <div class="form-row">
        <div class="form-label">卖价 <span class="required">*</span></div>
        <div class="input-group">
          <select class="cur-sel" id="f-price-cur" onchange="document.getElementById('f-deposit-cur').value=this.value">
            <option value="RM">RM</option>
            <option value="RMB">RMB</option>
          </select>
          <input class="form-input" id="f-price" type="number" placeholder="请输入卖价" min="0" step="0.01">
        </div>
      </div>

      <div class="form-row">
        <div class="form-label">代理负责人 <span class="required">*</span></div>
        <input class="form-input" id="f-agent" type="text" placeholder="请输入代理负责人">
      </div>

      <div class="form-row">
        <div class="form-label">支付方式</div>
        <input class="form-input" id="f-payment" type="text" placeholder="请填写支付方式，例如 Transfer / Cash / Wechat">
      </div>

      <div class="form-footer">
        <div class="form-notice">ℹ️ 除支付方式外，其它栏位为必填，填写完成后才能保存客户</div>
        <div style="display:flex;gap:10px">
          <button class="btn-secondary" onclick="clearForm()">清除</button>
          <button class="btn-primary" id="btn-save" onclick="submitCustomer()">保存客户</button>
        </div>
      </div>

    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const AGENT_PW = 'daili4896';
const SB_URL = 'https://kkxdhkqatalgxbsogyly.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtreGRoa3FhdGFsZ3hic29neWx5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3MDQ4NTksImV4cCI6MjA5ODI4MDg1OX0.ewte2esrv1cOFQ5GngSA7dZqJkHCyiCcUXErxKxlClk';
const SB_H = { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };

async function loadProjectOptions() {
  var sel = document.getElementById('f-project');
  if (!sel) return;
  var keepVal = sel.value;
  try {
    var r = await fetch(SB_URL + '/rest/v1/projects?select=name&status=eq.已启用&order=sort_order.asc,id.asc', { headers: SB_H });
    var data = await r.json();
    if (Array.isArray(data) && data.length > 0) {
      sel.innerHTML = '<option value="">请选择项目内容</option>' +
        data.map(function(p){ return '<option>' + p.name + '</option>'; }).join('');
      sel.value = keepVal;
    }
  } catch(e) { /* keep existing options if fetch fails */ }
}

function doLogin() {
  var pw = document.getElementById('pw-input').value.trim();
  var err = document.getElementById('login-err');
  if (pw === AGENT_PW) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadProjectOptions();
  } else {
    err.textContent = '❌ 密码错误，请重试';
    document.getElementById('pw-input').value = '';
    setTimeout(function(){ err.textContent = ''; }, 2000);
  }
}

function doLogout() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('pw-input').value = '';
  clearForm();
}

function showToast(msg, isErr) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = isErr ? '#EF4444' : '#10B981';
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 3000);
}

function clearForm() {
  ['f-name','f-passport','f-deposit','f-price','f-agent','f-payment'].forEach(function(id){
    var el = document.getElementById(id);
    if (el) { el.value = ''; el.classList.remove('error'); }
  });
  document.getElementById('f-project').value = '';
  document.getElementById('f-deposit-cur').value = 'RM';
  document.getElementById('f-price-cur').value = 'RM';
  document.getElementById('success-banner').style.display = 'none';
}

async function getNextNo() {
  try {
    var r = await fetch(SB_URL + '/rest/v1/customers?select=customer_no&order=customer_no.desc&limit=1', { headers: SB_H });
    var data = await r.json();
    if (Array.isArray(data) && data.length > 0 && data[0].customer_no) {
      return (parseInt(data[0].customer_no) || 0) + 1;
    }
  } catch(e) {}
  return 1;
}

async function submitCustomer() {
  var required = [
    { id: 'f-name' }, { id: 'f-passport' }, { id: 'f-project' },
    { id: 'f-deposit' }, { id: 'f-price' }, { id: 'f-agent' }
  ];
  var valid = true;
  required.forEach(function(f) {
    var el = document.getElementById(f.id);
    el.classList.remove('error');
    if (!el.value.trim()) { el.classList.add('error'); valid = false; }
  });
  if (!valid) { showToast('⚠️ 请填写所有必填栏位', true); return; }

  var btn = document.getElementById('btn-save');
  btn.disabled = true; btn.textContent = '提交中...';

  try {
    var name       = document.getElementById('f-name').value.trim();
    var passport   = document.getElementById('f-passport').value.trim();
    var project    = document.getElementById('f-project').value.trim();
    var depositCur = document.getElementById('f-deposit-cur').value;
    var deposit    = parseFloat(document.getElementById('f-deposit').value) || 0;
    var price      = parseFloat(document.getElementById('f-price').value) || 0;
    var agent      = document.getElementById('f-agent').value.trim();
    var payment    = document.getElementById('f-payment').value.trim();

    var today = new Date();
    var todayStr = today.getFullYear() + '-' +
      String(today.getMonth()+1).padStart(2,'0') + '-' +
      String(today.getDate()).padStart(2,'0');

    var nextNo = await getNextNo();

    var custData = {
      name: name, passport: passport, project: project, agent: agent,
      deposit: deposit, cost_type: depositCur, price: price,
      payment: payment || '', submit_date: todayStr,
      customer_no: nextNo, progress: '待递交', status: '未完成'
    };

    var r = await fetch(SB_URL + '/rest/v1/customers', {
      method: 'POST', headers: SB_H, body: JSON.stringify(custData)
    });

    if (r.ok) {
      var banner = document.getElementById('success-banner');
      banner.style.display = 'block';
      document.getElementById('s-title').textContent = '✅ 客户 #' + nextNo + ' 已成功提交！';
      document.getElementById('s-sub').textContent = name + ' · ' + project + ' · 管理员将跟进处理';
      showToast('✅ ' + name + ' 提交成功！');
      clearForm();
      document.getElementById('success-banner').style.display = 'block';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } else {
      showToast('❌ 提交失败，请重试', true);
    }
  } catch(e) {
    showToast('❌ 网络错误，请检查连接', true);
  }

  btn.disabled = false; btn.textContent = '保存客户';
}
</script>
</body>
</html>

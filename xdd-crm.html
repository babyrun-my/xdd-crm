<style>

*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f4f8;color:var(--text);min-height:100vh;}

/* APP LAYOUT */
#app{display:none;}
.layout{display:flex;min-height:100vh;}
.sidebar{width:var(--sw);background:var(--bg2);position:fixed;top:0;left:0;height:100vh;z-index:100;display:flex;flex-direction:column;border-right:1px solid rgba(255,255,255,.05);}

/* ALERTS */
.alert{padding:11px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;}

/* LOADING */
.loading{text-align:center;padding:40px;color:var(--text-light);}
.spinner{display:inline-block;width:28px;height:28px;border:3px solid #e2e8f0;border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;margin-right:8px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:720px;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:17px;font-weight:700;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;}
.modal-close{cursor:pointer;font-size:20px;color:var(--text-light);}
.modal-close:hover{color:var(--text);}

/* PROGRESS SELECT */
.prog-sel{padding:4px 8px;font-size:11px;border-radius:6px;border:1px solid var(--border);cursor:pointer;outline:none;}
.status-sel{padding:4px 8px;font-size:11px;border-radius:6px;border:1px solid var(--border);cursor:pointer;outline:none;}

/* EXPIRY */
.exp-30{color:#dc2626;font-weight:700;}
.exp-60{color:#d97706;font-weight:700;}
.exp-90{color:#059669;}

/* FINANCE STATUS */
.fin-bar{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:16px;}
.fin-stat{background:#fff;border-radius:10px;padding:12px 16px;border-left:3px solid var(--primary);box-shadow:0 1px 3px rgba(0,0,0,.06);min-width:140px;}
.fin-stat.g{border-left-color:var(--success);}
.fin-stat.o{border-left-color:var(--warning);}

.fin-lbl{font-size:11px;color:var(--text-light);}
.fin-val{font-size:18px;font-weight:800;color:var(--bg);margin-top:2px;}

.hidden{display:none!important;}

/* CONFIG BANNER */
.cfg-banner{background:linear-gradient(135deg,#fef3c7,#fde68a);border:1px solid #f59e0b;border-radius:12px;padding:16px 20px;margin-bottom:20px;}

</style>

<script>
// ========================================
// CONFIG — 填入你的 Supabase 信息
// ========================================
const SUPABASE_URL = 'https://kkxdhkqatalgxbsogyly.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtreGRoa3FhdGFsZ3hic29neWx5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3MDQ4NTksImV4cCI6MjA5ODI4MDg1OX0.ewte2esrv1cOFQ5GngSA7dZqJkHCyiCcUXErxKxlClk';
const GS_WEBHOOK  = ''; // (可选) Google Sheets Apps Script URL

// ========================================
// SUPABASE API
// ========================================
let _token = null;
let _user  = null;

const sb = {
  headers(extra={}) {
    const h = { 'Content-Type':'application/json', 'apikey': SUPABASE_KEY, 'Prefer':'return=representation' };
    if (_token) h['Authorization'] = 'Bearer ' + _token;
    return Object.assign(h, extra);
  },
  async login(email, pass) {
    const r = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
      method:'POST', headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY},
      body: JSON.stringify({email, password:pass})
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error_description || d.msg || '登录失败');
    _token = d.access_token;
    _user  = d.user;
    localStorage.setItem('sb_token', _token);
    localStorage.setItem('sb_user', JSON.stringify(_user));
    return d;
  },
  logout() {
    _token = null; _user = null;
    localStorage.removeItem('sb_token');
    localStorage.removeItem('sb_user');
  },
  restoreSession() {
    _token = localStorage.getItem('sb_token');
    const u = localStorage.getItem('sb_user');
    if (u) _user = JSON.parse(u);
    return !!_token;
  },
  async get(table, params='') {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`, { headers: this.headers() });
    if (!r.ok) { if(r.status===401){doLogout();return[];} throw new Error(await r.text()); }
    return r.json();
  },
  async post(table, data) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
      method:'POST', headers: this.headers(), body: JSON.stringify(data)
    });
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async patch(table, id, data) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
      method:'PATCH', headers: this.headers(), body: JSON.stringify(data)
    });
    if (!r.ok) throw new Error(await r.text());
    return r.status === 204 ? {} : r.json();
  },
  async del(table, id) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
      method:'DELETE', headers: this.headers()
    });
    if (!r.ok) throw new Error(await r.text());
    return true;
  }
};

// ========================================
// GOOGLE SHEETS SYNC
// ========================================
async function syncToSheets(action, data) {
  if (!GS_WEBHOOK) return;
  try {
    await fetch(GS_WEBHOOK, {
      method:'POST',
      body: JSON.stringify({ action, customer: data }),
      headers:{'Content-Type':'application/json'}
    });
    setSyncStatus('✅ 已同步 Sheets');
  } catch(e) {
    setSyncStatus('⚠️ Sheets 同步失败');
  }
}
function setSyncStatus(msg) {
  const el = document.getElementById('sync-status');
  if (el) { el.textContent = msg; setTimeout(()=>el.textContent='', 4000); }
}

// ========================================
// HELPERS
// ========================================
const PROGRESS = ['待递交','待补资料','材料审核','处理中','审批中','已完成'];
const FIN_CATS = ['每日Payout','赔钱','邮寄','车费','办公用品','平台费用','广告费用','其它'];
const MONTHS_CN = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];

function today() {
  return new Date().toISOString().split('T')[0];
}
function thisMonth() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
function daysUntil(dateStr) {
  if (!dateStr) return null;
  const diff = new Date(dateStr) - new Date();
  return Math.ceil(diff / 86400000);
}
function fmt(n) {
  return (n||0).toLocaleString('en-MY',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function progBadge(p) {
  const map = {
    '待递交':'b-yellow','待补资料':'b-red','材料审核':'b-blue',
    '处理中':'b-purple','审批中':'b-blue','已完成':'b-green'
  };
  return `<span class="badge ${map[p]||'b-gray'}">${p||'-'}</span>`;
}
function statusBadge(s) {
  return `<span class="badge ${s==='已完成'?'b-green':'b-yellow'}">${s||'-'}</span>`;

function expiryClass(days) {
  if (days===null) return '';
  if (days<=30) return 'exp-30';
  if (days<=60) return 'exp-60';
  if (days<=90) return 'exp-90';
  return '';
}
function getUserRole() {
  if (!_user) return 'agent';
  const meta = _user.user_metadata || {};
  return meta.role || 'admin'; // default admin for now
}
function isAdmin() { return getUserRole()==='admin'; }

let _customers = [];

async function renderCustomers() {
  try {
    _customers = await sb.get('customers','select=*&order=created_at.desc');
    const projects = await sb.get('projects','select=name&status=eq.已启用&order=sort_order');
    renderCustomerTable(projects);
  } catch(e) {
    document.getElementById('page-content').innerHTML = `<div class="alert alert-err">${e.message}</div>`;
  }
}

function renderCustomerTable(projects) {
  const months = [...new Set(_customers.map(c=>c.created_at?.slice(0,7)).filter(Boolean))].sort().reverse();
  let filtered = _customers.filter(c => {
    const q = _searchQ.toLowerCase();
    const matchQ = !q || (c.name||'').toLowerCase().includes(q) || (c.passport||'').includes(q) || (c.agent||'').toLowerCase().includes(q) || (c.project||'').toLowerCase().includes(q);
    const matchS = !_filterStatus || c.status === _filterStatus;
    const matchP = !_filterProject || c.project === _filterProject;
    const matchM = !_filterMonth || (c.created_at||'').startsWith(_filterMonth);
    return matchQ && matchS && matchP && matchM;
  });

  document.getElementById('page-content').innerHTML = `
    <div class="card">
      <div class="search-bar">
        <input type="text" placeholder="🔍 搜索姓名/护照/代理/项目..." value="${_searchQ}" oninput="_searchQ=this.value;renderCustomerTable()" id="cust-search">
        <select onchange="_filterStatus=this.value;renderCustomerTable()">
          <option value="">全部状态</option>
          <option value="未完成" ${_filterStatus==='未完成'?'selected':''}>未完成</option>
          <option value="已完成" ${_filterStatus==='已完成'?'selected':''}>已完成</option>
        </select>
        <select onchange="_filterProject=this.value;renderCustomerTable()">
          <option value="">全部项目</option>
          ${(projects||[]).map(p=>`<option value="${p.name}" ${_filterProject===p.name?'selected':''}>${p.name}</option>`).join('')}
        </select>
        <select onchange="_filterMonth=this.value;renderCustomerTable()">
          <option value="">全部月份</option>
          ${months.map(m=>`<option value="${m}" ${_filterMonth===m?'selected':''}>${m}</option>`).join('')}
        </select>
        <span class="spacer"></span>
        <span style="font-size:12px;color:var(--text-light);">${filtered.length} 条记录</span>
        <button class="btn btn-primary btn-sm" onclick="navigate('add-customer')">➕ 新增客户</button>
      </div>
      <div class="tbl-wrap">
        <table>
          <thead><tr>
            <th>NO.</th><th>姓名</th><th>护照号</th><th>跟进人</th><th>项目内容</th><th>代理</th>
            <th>卖价(RM)</th><th>本钱(RM)</th><th>利润(RM)</th>
            <th>押金(RM)</th><th>支付方式</th><th>签证到期</th><th>倒数VALID</th>
            <th>当前进度</th><th>状态</th><th>操作</th>
          </tr></thead>
          <tbody>
            ${filtered.length ? filtered.map((c,i)=>{
              const days = daysUntil(c.visa_date);
              const profit = (c.price||0)-(c.cost||0);
              return `<tr>
                <td>${filtered.length-i}</td>
                <td><strong>${c.name||'-'}</strong></td>
                <td>${c.passport||'-'}</td>
                <td>${c.followup||'-'}</td>
                <td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${c.project||''}">${c.project||'-'}</td>
                <td>${c.agent||'-'}</td>
                <td>${fmt(c.price)}</td>
                <td>${fmt(c.cost)}</td>
                <td class="${profit>0?'':'exp-30'}"><strong>${fmt(profit)}</strong></td>
                <td>${fmt(c.deposit)}</td>
                <td>${c.payment||'-'}</td>
                <td>${c.visa_date||'-'}</td>
                <td class="${expiryClass(days)}">${days!==null?(days>0?days+'天':'已到期'):'-'}</td>
                <td>
                  <select class="prog-sel" onchange="updateField('${c.id}','progress',this.value,event)">
                    ${PROGRESS.map(p=>`<option ${c.progress===p?'selected':''}>${p}</option>`).join('')}
                  </select>
                </td>
                <td>
                  <select class="status-sel" onchange="updateField('${c.id}','status',this.value,event)">
                    <option ${c.status==='未完成'?'selected':''}>未完成</option>
                    <option ${c.status==='已完成'?'selected':''}>已完成</option>
                  </select>
                </td>
                <td style="white-space:nowrap;">
                  <button class="btn btn-secondary btn-sm btn-icon" onclick="editCustomer('${c.id}')" title="编辑">✏️</button>
                  ${isAdmin()?`<button class="btn btn-danger btn-sm btn-icon" onclick="deleteCustomer('${c.id}','${(c.name||'').replace(/'/g,'')}')" title="删除">🗑️</button>`:''}
                </td>
              </tr>`;
            }).join('') : '<tr><td colspan="16" style="text-align:center;padding:30px;color:var(--text-light);">暂无数据</td></tr>'}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

async function updateField(id, field, val, e) {
  try {
    await sb.patch('customers', id, {[field]: val});
    const idx = _customers.findIndex(c=>c.id===id);
    if (idx>=0) _customers[idx][field] = val;
  } catch(err) {
    alert('更新失败: ' + err.message);
  }
}

async function deleteCustomer(id, name) {
  if (!confirm(`确认删除客户 ${name}?`)) return;
  try {
    await sb.del('customers', id);
    _customers = _customers.filter(c=>c.id!==id);
    renderCustomerTable();
  } catch(e) { alert('删除失败: '+e.message); }
}

async function saveCustomer() {
  const name     = document.getElementById('f-name').value.trim();
  const passport = document.getElementById('f-passport').value.trim();
  const project  = document.getElementById('f-project').value;
  const price    = parseFloat(document.getElementById('f-price').value)||0;
  const deposit  = parseFloat(document.getElementById('f-deposit').value)||0;
  const agent    = document.getElementById('f-agent').value.trim();
  const followup = document.getElementById('f-followup').value.trim();
  const payment  = document.getElementById('f-payment').value;
  const note     = document.getElementById('f-note').value.trim();
  const alertEl  = document.getElementById('add-alert');

  if (!name||!passport||!project||!price||!agent) {
    alertEl.innerHTML = '<div class="alert alert-err">⚠️ 请填写所有必填栏位（姓名、护照号、项目、卖价、代理）</div>';
    return;
  }

  // Get cost from selected project
  const projSel = document.getElementById('f-project');
  const projOpt = projSel.options[projSel.selectedIndex];
  const cost = parseFloat(projOpt?.dataset?.cost)||0;

  const d = new Date();
  const month = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;

  const data = { name, passport, project, price, deposit, agent, followup, payment, note, cost, month,
    cost_type:'RM', progress:'待递交', status:'未完成', submit_date: today() };

  try {
    const rows = await sb.post('customers', data);
    alertEl.innerHTML = '<div class="alert alert-ok">✅ 客户已保存！</div>';
    // Sync to Google Sheets
    await syncToSheets('add', rows[0]||data);
    setTimeout(()=>navigate('customers'), 1500);
  } catch(e) {
    alertEl.innerHTML = `<div class="alert alert-err">保存失败: ${e.message}</div>`;
  }
}

async function saveEdit(id) {
  const data = {
    name:      document.getElementById('e-name').value.trim(),
    passport:  document.getElementById('e-passport').value.trim(),
    followup:  document.getElementById('e-followup').value.trim(),
    agent:     document.getElementById('e-agent').value.trim(),
    project:   document.getElementById('e-project').value,
    price:     parseFloat(document.getElementById('e-price').value)||0,
    cost:      parseFloat(document.getElementById('e-cost').value)||0,
    deposit:   parseFloat(document.getElementById('e-deposit').value)||0,
    extra_fee: parseFloat(document.getElementById('e-extra').value)||0,
    pass_to:   document.getElementById('e-passto').value.trim(),
    payment:   document.getElementById('e-payment').value,
    submit_date: document.getElementById('e-submit').value,
    visa_date: document.getElementById('e-visa').value,
    progress:  document.getElementById('e-progress').value,
    status:    document.getElementById('e-status').value,
    note:      document.getElementById('e-note').value.trim()
  };
  try {
    await sb.patch('customers', id, data);
    const idx = _customers.findIndex(c=>c.id===id);
    if (idx>=0) _customers[idx] = {..._customers[idx], ...data};
    document.querySelector('.modal-bg').remove();
    renderCustomerTable();
    await syncToSheets('update', {id, ...data});
  } catch(e) {
    document.getElementById('edit-alert').innerHTML = `<div class="alert alert-err">${e.message}</div>`;
  }
}

async function addProject() {
  const name = document.getElementById('np-name').value.trim();
  const cost = parseFloat(document.getElementById('np-cost').value)||0;
  const status = document.getElementById('np-status').value;
  if (!name) { alert('请填写项目名称'); return; }
  try {
    await sb.post('projects',{name,cost,status});
    document.querySelector('.modal-bg').remove();
    renderProjects();
  } catch(e) { alert(e.message); }
}

function editProjectById(id) {
  const p = (_projects||[]).find(x=>x.id===id);
  if(p) editProject(p.id, p.name, p.cost, p.status);
}
function editProject(id, name, cost, status) {
  const modal = document.createElement('div');

}

async function saveProject(id) {
  const name = document.getElementById('ep-name').value.trim();
  const cost = parseFloat(document.getElementById('ep-cost').value)||0;
  const status = document.getElementById('ep-status').value;
  try {
    await sb.patch('projects',id,{name,cost,status});
    document.querySelector('.modal-bg').remove();

  } catch(e) { alert(e.message); }

async function deleteProject(id) {
  if (!confirm('确认删除此项目？')) return;

}

// ========================================
// FINANCE
// ========================================
let _finCat = '', _finMonth = '', _finSearch = '';
async function renderFinance() {
  try {
    const rows = await sb.get('finance','select=*&order=date.desc,created_at.desc');
    const todayStr = today();
    const monthStr = thisMonth();

    const todayPayout = rows.filter(f=>f.date===todayStr&&f.category==='每日Payout').reduce((s,f)=>s+(f.amount||0),0);
    const monthLoss   = rows.filter(f=>f.date?.startsWith(monthStr)&&f.category==='赔钱').reduce((s,f)=>s+(f.amount||0),0);
    const monthPost   = rows.filter(f=>f.date?.startsWith(monthStr)&&f.category==='邮寄').reduce((s,f)=>s+(f.amount||0),0);
    const monthCar    = rows.filter(f=>f.date?.startsWith(monthStr)&&f.category==='车费').reduce((s,f)=>s+(f.amount||0),0);
    const monthTotal  = rows.filter(f=>f.date?.startsWith(monthStr)).reduce((s,f)=>s+(f.amount||0),0);

    const months = [...new Set(rows.map(f=>f.date?.slice(0,7)).filter(Boolean))].sort().reverse();

    let filtered = rows.filter(f=>{
      const q = _finSearch.toLowerCase();
      const mq = !q||(f.description||'').toLowerCase().includes(q)||(f.person||'').toLowerCase().includes(q);
      const mc = !_finCat||f.category===_finCat;
      const mm = !_finMonth||f.date?.startsWith(_finMonth);
      return mq&&mc&&mm;
    });

    document.getElementById('page-content').innerHTML = `
      <div class="fin-bar">
        <div class="fin-stat"><div class="fin-lbl">今日 Payout</div><div class="fin-val">RM ${fmt(todayPayout)}</div></div>
        <div class="fin-stat r"><div class="fin-lbl">本月赔钱</div><div class="fin-val">RM ${fmt(monthLoss)}</div></div>
        <div class="fin-stat o"><div class="fin-lbl">本月邮寄</div><div class="fin-val">RM ${fmt(monthPost)}</div></div>
        <div class="fin-stat"><div class="fin-lbl">本月车费</div><div class="fin-val">RM ${fmt(monthCar)}</div></div>
        <div class="fin-stat g"><div class="fin-lbl">本月总支出</div><div class="fin-val">RM ${fmt(monthTotal)}</div></div>
      </div>
      <div class="card">
        <div class="search-bar">
          <input placeholder="🔍 搜索项目/负责人..." oninput="_finSearch=this.value;renderFinance()" value="${_finSearch}">
          <select onchange="_finCat=this.value;renderFinance()">
            <option value="">全部分类</option>
            ${FIN_CATS.map(c=>`<option ${_finCat===c?'selected':''}>${c}</option>`).join('')}
          </select>
          <select onchange="_finMonth=this.value;renderFinance()">
            <option value="">全部月份</option>
            ${months.map(m=>`<option ${_finMonth===m?'selected':''}>${m}</option>`).join('')}
          </select>
          <span class="spacer"></span>
          <button class="btn btn-primary btn-sm" onclick="showAddFinance()">➕ 新增记录</button>
        </div>
        <div class="tbl-wrap">
          <table>
            <thead><tr><th>日期</th><th>分类</th><th>项目说明</th><th>金额(RM)</th><th>支付方式</th><th>负责人</th><th>状态</th><th>备注</th><th>操作</th></tr></thead>
            <tbody>
              ${filtered.length ? filtered.map(f=>`
                <tr>
                  <td>${f.date}</td>
                  <td><span class="badge b-blue">${f.category}</span></td>
                  <td>${f.description||'-'}</td>
                  <td><strong>RM ${fmt(f.amount)}</strong></td>
                  <td>${f.payment||'-'}</td>
                  <td>${f.person||'-'}</td>
                  <td><span class="badge ${f.status==='已付款'?'b-green':f.status==='待付款'?'b-yellow':'b-red'}">${f.status}</span></td>
                  <td>${f.note||'-'}</td>
                  <td style="white-space:nowrap;">
                    <button class="btn btn-danger btn-sm btn-icon" onclick="deleteFinance('${f.id}')">🗑️</button>
                  </td>
                </tr>
              `).join('') : '<tr><td colspan="9" style="text-align:center;padding:30px;color:var(--text-light);">暂无记录</td></tr>'}
            </tbody>
          </table>
        </div>
      </div>
    `;
  } catch(e) {
    document.getElementById('page-content').innerHTML = `<div class="alert alert-err">${e.message}</div>`;
  }
}

async function saveFinance() {
  const date   = document.getElementById('nf-date').value;
  const cat    = document.getElementById('nf-cat').value;
  const amt    = parseFloat(document.getElementById('nf-amt').value)||0;
  if (!date||!cat||!amt) { alert('请填写日期、分类和金额'); return; }
  const data = {
    date, category:cat,
    description: document.getElementById('nf-desc').value,
    amount: amt,
    payment: document.getElementById('nf-pay').value,
    person: document.getElementById('nf-person').value,
    status: document.getElementById('nf-status').value,
    note: document.getElementById('nf-note').value
  };
  try {
    await sb.post('finance', data);
    document.querySelector('.modal-bg').remove();
    renderFinance();
  } catch(e) { alert(e.message); }
}

async function deleteFinance(id) {
  if (!confirm('确认删除此记录？')) return;
  try { await sb.del('finance',id); renderFinance(); } catch(e) { alert(e.message); }
}

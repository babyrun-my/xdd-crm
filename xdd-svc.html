function renderSlide() {
  var s = SLIDES[slideIdx];
  var slider = document.getElementById('slider');
  var dotsEl = document.getElementById('slider-dots');
  if (!slider) return;
  slider.style.background = s.bg;
  slider.innerHTML = '<div class="slide active">' +
    '<div class="slide-tag"><span class="dot"></span>' + s.tag + '</div>' +
    '<div class="slide-title">' + s.title + '</div>' +
    '<div class="slide-sub">' + s.sub + '</div>' +
    '<div class="slide-badges">' + s.badges.map(function(b){ return '<span class="slide-badge">' + b + '</span>'; }).join('') + '</div>' +
  '</div>';
  dotsEl.innerHTML = SLIDES.map(function(_, i){
    return '<button class="slider-dot' + (i===slideIdx?' active':'') + '" onclick="goToSlide(' + i + ')"></button>';
  }).join('');
}
function goToSlide(i) {
  slideIdx = i;
  renderSlide();
  resetSlideTimer();
}
function nextSlide() {
  slideIdx = (slideIdx + 1) % SLIDES.length;
  renderSlide();
}
function resetSlideTimer() {
  if (slideTimer) clearInterval(slideTimer);
  slideTimer = setInterval(nextSlide, 4500);
}

var sliderEl = document.getElementById('slider');

}

  var grid = document.getElementById('proj-grid');
  try {
    var res = await fetch(SB_URL + '/rest/v1/projects?status=eq.已启用&order=sort_order.asc,id.asc', {
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
    });
    var data = await res.json();
    if (!Array.isArray(data) || data.length === 0) {
      grid.innerHTML = '<div style="color:#8BA3C7;padding:20px;">暂无服务项目</div>';
      return;
    }
    allCards = data;
    renderCards(data);
    document.getElementById('top-count').textContent = '共 ' + data.length + ' 项服务';
  } catch(e) {
    grid.innerHTML = '<div style="color:#EF4444;padding:20px;">加载失败: ' + e.message + '</div>';
    document.getElementById('top-count').textContent = '加载失败';
  }
}

function renderCards(items) {
  var grid = document.getElementById('proj-grid');
  grid.innerHTML = items.map(function(p) {
    var info = PRICE_LOOKUP[normName(p.name)];
    var isHot = HOT_NAMES.indexOf(p.name) !== -1;
    var badges = '';
    var priceHtml;

    if (info && info.length > 1) {
      // 多档价格（比如第二家园）
      priceHtml = '<div class="proj-price-tiers">' + info.map(function(t){
        return '<div class="tier-row"><span>' + t.n + '</span><b>' + t.c + ' ' + t.p + '</b></div>';
      }).join('') + '</div>';
    } else if (info && info.length === 1) {
      var t = info[0];
      var isFast = /分钟|当天/.test(t.n);
      priceHtml = '<div class="proj-price-row"><span class="proj-price-num">' + t.c + ' ' + t.p + '</span></div>';
      if (isFast) {
        badges += '<span class="proj-fast-badge">⚡ ' + t.n + '</span>';
      } else {
        priceHtml += '<div class="proj-note">' + t.n + '</div>';
      }
    } else {
      priceHtml = '<div class="proj-price-row"><span style="color:#4B6080;font-size:13px;">请询价</span></div>';
    }
    if (isHot) badges += '<span class="proj-hot-badge">🔥 热门</span>';

    return '<div class="proj-card">' +
      (badges ? '<div class="proj-badge-row">' + badges + '</div>' : '') +
      '<div class="proj-name">' + p.name + '</div>' +
      priceHtml +
      '</div>';
  }).join('');
  document.getElementById('svc-count').textContent = '显示 ' + items.length + ' 项';
}

function filterCards() {
  var kw = document.getElementById('svc-search').value.toLowerCase().trim();
  if (!kw) { renderCards(allCards); return; }
  var filtered = allCards.filter(function(p){ return p.name.toLowerCase().includes(kw); });
  renderCards(filtered);
}
</script>
</body>
</html>

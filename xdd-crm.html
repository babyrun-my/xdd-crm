*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f4f8;color:var(--text);min-height:100vh;}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;}

      method:'POST', headers: this.headers(), body: JSON.stringify(data)

      method:'PATCH', headers: this.headers(), body: JSON.stringify(data)
    });

async function updateField(id, field, val, e) {
  try {
    await sb.patch('customers', id, {[field]: val});
    const idx = _customers.findIndex(c=>c.id===id);
    if (idx>=0) _customers[idx][field] = val;
  } catch(err) {
    alert('忙聸麓忙聳掳氓陇卤猫麓楼: ' + err.message);
  }
}

async function deleteCustomer(id, name) {
  if (!confirm(`莽隆庐猫庐陇氓聢聽茅聶陇氓庐垄忙聢路 ${name}?`)) return;
  try {
    await sb.del('customers', id);
    _customers = _customers.filter(c=>c.id!==id);
    renderCustomerTable();
  } catch(e) { alert('氓聢聽茅聶陇氓陇卤猫麓楼: '+e.message); }
}

async function saveCustomer() {

  const project  = document.getElementById('f-project').value;
  const price    = parseFloat(document.getElementById('f-price').value)||0;

  const agent    = document.getElementById('f-agent').value.trim();
  const followup = document.getElementById('f-followup').value.trim();
  const payment  = document.getElementById('f-payment').value;
  const note     = document.getElementById('f-note').value.trim();

    return;
  }

  // Get cost from selected project
  const projSel = document.getElementById('f-project');
  const projOpt = projSel.options[projSel.selectedIndex];
  const cost = parseFloat(projOpt?.dataset?.cost)||0;

  const d = new Date();
  const month = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;

  const data = { name, passport, project, price, deposit, agent, followup, payment, note, cost, month,
    cost_type:'RM', progress:'氓戮聟茅聙聮盲潞陇', status:'忙聹陋氓庐聦忙聢聬', submit_date: today() };

  try {
    const rows = await sb.post('customers', data);

  }
}

          <option ${status==='忙職聜氓聛聹忙聹聧氓聤隆'?'selected':''}>忙職聜氓聛聹忙聹聧氓聤隆</option>
        </select>
      </div>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px;">
        <button class="btn btn-secondary" onclick="this.closest('.modal-bg').remove()">氓聫聳忙露聢</button>
        <button class="btn btn-primary" onclick="saveProject('${id}')">盲驴聺氓颅聵</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
}

async function saveProject(id) {
  const name = document.getElementById('ep-name').value.trim();
  const cost = parseFloat(document.getElementById('ep-cost').value)||0;
  const status = document.getElementById('ep-status').value;
  try {
    await sb.patch('projects',id,{name,cost,status});
    document.querySelector('.modal-bg').remove();
    renderProjects();
  } catch(e) { alert(e.message); }
}

async function deleteProject(id) {
  if (!confirm('莽隆庐猫庐陇氓聢聽茅聶陇忙颅陇茅隆鹿莽聸庐茂录聼')) return;
  try { await sb.del('projects',id); renderProjects(); } catch(e) { alert(e.message); }
}

// ========================================
// FINANCE
// ========================================
let _finCat = '', _finMonth = '', _finSearch = '';
async function renderFinance() {
  try {
    const rows = await sb.get('finance','select=*&order=date.desc,created_at.desc');
    const todayStr = today();
    const monthStr = thisMonth();

    const todayPayout = rows.filter(f=>f.date===todayStr&&f.category==='忙炉聫忙聴楼Payout').reduce((s,f)=>s+(f.amount||0),0);
    const monthLoss   = rows.filter(f=>f.date?.startsWith(monthStr)&&f.category==='猫碌聰茅聮卤').reduce((s,f)=>s+(f.amount||0),0);
    const monthPost   = rows.filter(f=>f.date?.startsWith(monthStr)&&f.category==='茅聜庐氓炉聞').reduce((s,f)=>s+(f.amount||0),0);
    const monthCar    = rows.filter(f=>f.date?.startsWith(monthStr)&&f.category==='猫陆娄猫麓鹿').reduce((s,f)=>s+(f.amount||0),0);
    const monthTotal  = rows.filter(f=>f.date?.startsWith(monthStr)).reduce((s,f)=>s+(f.amount||0),0);

    const months = [...new Set(rows.map(f=>f.date?.slice(0,7)).filter(Boolean))].sort().reverse();

    let filtered = rows.filter(f=>{
      const q = _finSearch.toLowerCase();
      const mq = !q||(f.description||'').toLowerCase().includes(q)||(f.person||'').toLowerCase().includes(q);
      const mc = !_finCat||f.category===_finCat;
      const mm = !_finMonth||f.date?.startsWith(_finMonth);
      return mq&&mc&&mm;
    });

    document.getElementById('page-content').innerHTML = `
      <div class="fin-bar">
        <div class="fin-stat"><div class="fin-lbl">盲禄聤忙聴楼 Payout</div><div class="fin-val">RM ${fmt(todayPayout)}</div></div>
        <div class="fin-stat r"><div class="fin-lbl">忙聹卢忙聹聢猫碌聰茅聮卤</div><div class="fin-val">RM ${fmt(monthLoss)}</div></div>
        <div class="fin-stat o"><div class="fin-lbl">忙聹卢忙聹聢茅聜庐氓炉聞</div><div class="fin-val">RM ${fmt(monthPost)}</div></div>
        <div class="fin-stat"><div class="fin-lbl">忙聹卢忙聹聢猫陆娄猫麓鹿</div><div class="fin-val">RM ${fmt(monthCar)}</div></div>
        <div class="fin-stat g"><div class="fin-lbl">忙聹卢忙聹聢忙聙禄忙聰炉氓聡潞</div><div class="fin-val">RM ${fmt(monthTotal)}</div></div>
      </div>
      <div class="card">
        <div class="search-bar">
          <input placeholder="冒聼聰聧 忙聬聹莽麓垄茅隆鹿莽聸庐/猫麓聼猫麓拢盲潞潞..." oninput="_finSearch=this.value;renderFinance()" value="${_finSearch}">
          <select onchange="_finCat=this.value;renderFinance()">
            <option value="">氓聟篓茅聝篓氓聢聠莽卤禄</option>
            ${FIN_CATS.map(c=>`<option ${_finCat===c?'selected':''}>${c}</option>`).join('')}
          </select>
          <select onchange="_finMonth=this.value;renderFinance()">
            <option value="">氓聟篓茅聝篓忙聹聢盲禄陆</option>
            ${months.map(m=>`<option ${_finMonth===m?'selected':''}>${m}</option>`).join('')}
          </select>
          <span class="spacer"></span>
          <button class="btn btn-primary btn-sm" onclick="showAddFinance()">芒聻聲 忙聳掳氓垄聻猫庐掳氓陆聲</button>
        </div>
        <div class="tbl-wrap">
          <table>
            <thead><tr><th>忙聴楼忙聹聼</th><th>氓聢聠莽卤禄</th><th>茅隆鹿莽聸庐猫炉麓忙聵聨</th><th>茅聡聭茅垄聺(RM)</th><th>忙聰炉盲禄聵忙聳鹿氓录聫</th><th>猫麓聼猫麓拢盲潞潞</th><th>莽聤露忙聙聛</th><th>氓陇聡忙鲁篓</th><th>忙聯聧盲陆聹</th></tr></thead>
            <tbody>
              ${filtered.length ? filtered.map(f=>`
                <tr>
                  <td>${f.date}</td>
                  <td><span class="badge b-blue">${f.category}</span></td>
                  <td>${f.description||'-'}</td>
                  <td><strong>RM ${fmt(f.amount)}</strong></td>
                  <td>${f.payment||'-'}</td>
                  <td>${f.person||'-'}</td>
                  <td><span class="badge ${f.status==='氓路虏盲禄聵忙卢戮'?'b-green':f.status==='氓戮聟盲禄聵忙卢戮'?'b-yellow':'b-red'}">${f.status}</span></td>
                  <td>${f.note||'-'}</td>
                  <td style="white-space:nowrap;">
                    <button class="btn btn-danger btn-sm btn-icon" onclick="deleteFinance('${f.id}')">冒聼聴聭茂赂聫</button>
                  </td>
                </tr>
              `).join('') : '<tr><td colspan="9" style="text-align:center;padding:30px;color:var(--text-light);">忙職聜忙聴聽猫庐掳氓陆聲</td></tr>'}
            </tbody>
          </table>
        </div>
      </div>
    `;
  } catch(e) {
    document.getElementById('page-content').innerHTML = `<div class="alert alert-err">${e.message}</div>`;
  }
}

function showAddFinance() {
  const modal = document.createElement('div');
  modal.className = 'modal-bg';
  modal.innerHTML = `
    <div class="modal" style="max-width:480px;">
      <div class="modal-title">芒聻聲 忙聳掳氓垄聻猫麓垄氓聤隆猫庐掳氓陆聲 <span class="modal-close" onclick="this.closest('.modal-bg').remove()">芒聹聲</span></div>
      <div class="fg-row">
        <div class="fg"><label>忙聴楼忙聹聼 <span class="req">*</span></label><input type="date" id="nf-date" value="${today()}"></div>
        <div class="fg"><label>氓聢聠莽卤禄 <span class="req">*</span></label>
          <select id="nf-cat"><option value="">芒聙聰 茅聙聣忙聥漏 芒聙聰</option>${FIN_CATS.map(c=>`<option>${c}</option>`).join('')}</select>
        </div>
      </div>
      <div class="fg"><label>茅隆鹿莽聸庐猫炉麓忙聵聨</label><input id="nf-desc" placeholder="猫炉麓忙聵聨氓聠聟氓庐鹿"></div>
      <div class="fg-row">
        <div class="fg"><label>茅聡聭茅垄聺(RM) <span class="req">*</span></label><input type="number" id="nf-amt" placeholder="0.00" step="0.01"></div>
        <div class="fg"><label>忙聰炉盲禄聵忙聳鹿氓录聫</label>
          <select id="nf-pay"><option value="">芒聙聰</option><option>莽聨掳茅聡聭</option><option>猫陆卢猫麓娄</option><option>氓戮庐盲驴隆</option><option>氓聟露氓庐聝</option></select>
        </div>
      </div>
      <div class="fg-row">
        <div class="fg"><label>猫麓聼猫麓拢盲潞潞</label><input id="nf-person" placeholder="氓搂聯氓聬聧"></div>
        <div class="fg"><label>莽聤露忙聙聛</label>
          <select id="nf-status"><option>氓路虏盲禄聵忙卢戮</option><option>氓戮聟盲禄聵忙卢戮</option><option>茅聹聙莽隆庐猫庐陇</option></select>
        </div>
      </div>
      <div class="fg"><label>氓陇聡忙鲁篓</label><textarea id="nf-note" rows="2" placeholder="氓陇聡忙鲁篓..."></textarea></div>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px;">
        <button class="btn btn-secondary" onclick="this.closest('.modal-bg').remove()">氓聫聳忙露聢</button>
        <button class="btn btn-primary" onclick="saveFinance()">冒聼聮戮 盲驴聺氓颅聵</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
}

async function saveFinance() {
  const date   = document.getElementById('nf-date').value;
  const cat    = document.getElementById('nf-cat').value;
  const amt    = parseFloat(document.getElementById('nf-amt').value)||0;
  if (!date||!cat||!amt) { alert('猫炉路氓隆芦氓聠聶忙聴楼忙聹聼茫聙聛氓聢聠莽卤禄氓聮聦茅聡聭茅垄聺'); return; }
  const data = {
    date, category:cat,
    description: document.getElementById('nf-desc').value,
    amount: amt,
    payment: document.getElementById('nf-pay').value,
    person: document.getElementById('nf-person').value,
    status: document.getElementById('nf-status').value,
    note: document.getElementById('nf-note').value
  };
  try {
    await sb.post('finance', data);
    document.querySelector('.modal-bg').remove();
    renderFinance();
  } catch(e) { alert(e.message); }
}

async function deleteFinance(id) {
  if (!confirm('莽隆庐猫庐陇氓聢聽茅聶陇忙颅陇猫庐掳氓陆聲茂录聼')) return;
  try { await sb.del('finance',id); renderFinance(); } catch(e) { alert(e.message); }
}

// ========================================
// ARCHIVE (氓路虏氓庐聦忙聢聬氓庐垄忙聢路)
// ========================================
async function renderArchive() {
  try {
    const rows = await sb.get('customers','select=*&status=eq.氓路虏氓庐聦忙聢聬&order=created_at.desc');
    document.getElementById('page-content').innerHTML = `
      <div class="card">
        <div class="card-head">
          <span class="card-title">冒聼聯聛 氓陆聮忙隆拢 芒聙聰 氓路虏氓庐聦忙聢聬氓庐垄忙聢路 (${rows.length})</span>
        </div>
        <div class="tbl-wrap">
          <table>
            <thead><tr><th>NO.</th><th>氓搂聯氓聬聧</th><th>忙聤陇莽聟搂氓聫路</th><th>茅隆鹿莽聸庐</th><th>盲禄拢莽聬聠</th><th>氓聧聳盲禄路</th><th>氓聢漏忙露娄</th><th>莽颅戮猫炉聛氓聢掳忙聹聼</th><th>氓庐聦忙聢聬忙聴楼忙聹聼</th></tr></thead>
            <tbody>
              ${rows.length ? rows.map((c,i)=>`
                <tr>
                  <td>${i+1}</td>
                  <td><strong>${c.name}</strong></td>
                  <td>${c.passport}</td>
                  <td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${c.project||'-'}</td>
                  <td>${c.agent||'-'}</td>
                  <td>RM ${fmt(c.price)}</td>
                  <td><strong>RM ${fmt((c.price||0)-(c.cost||0))}</strong></td>
                  <td>${c.visa_date||'-'}</td>
                  <td>${c.created_at?.slice(0,10)||'-'}</td>
                </tr>
              `).join('') : '<tr><td colspan="9" style="text-align:center;padding:30px;color:var(--text-light);">忙職聜忙聴聽氓路虏氓庐聦忙聢聬氓庐垄忙聢路</td></tr>'}
            </tbody>
          </table>
        </div>
      </div>
    `;
  } catch(e) {
    document.getElementById('page-content').innerHTML = `<div class="alert alert-err">${e.message}</div>`;
  }
}

// ========================================
// INIT
// ========================================
(function init() {
  if (sb.restoreSession()) {
    startApp();
  }
})();
</script>
</body>
